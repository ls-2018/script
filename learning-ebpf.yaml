# This example requires Lima v0.8.0 or later
images:
- location: "https://cloud-images.ubuntu.com/releases/24.04/release-20240423/ubuntu-24.04-server-cloudimg-amd64.img"
  arch: "x86_64"
- location: "https://cloud-images.ubuntu.com/releases/24.04/release-20240423/ubuntu-24.04-server-cloudimg-arm64.img"
  arch: "aarch64"

cpus: 4
memory: "10GiB"
vmType: qemu


containerd:
  archives:
  - arch: x86_64
    digest: sha256:2c841e097fcfb5a1760bd354b3778cb695b44cd01f9f271c17507dc4a0b25606
    location: https://files.m.daocloud.io/github.com/containerd/nerdctl/releases/download/v1.7.6/nerdctl-full-1.7.6-linux-amd64.tar.gz
  - arch: aarch64
    digest: sha256:77c747f09853ee3d229d77e8de0dd3c85622537d82be57433dc1fca4493bab95
    location: https://files.m.daocloud.io/github.com/containerd/nerdctl/releases/download/v1.7.6/nerdctl-full-1.7.6-linux-arm64.tar.gz


mounts:
- location: "PWD"
  mountPoint: "/ebpf"
  writable: true
- location: "~/Desktop/"
  writable: true
- location: "~/script/"
  mountPoint: "/script"
  writable: false
- location: "/tmp/lima"
  writable: true
- location: "~/data/cargo_cache"
  mountPoint: "/root/.cargo"
  writable: true
- location: "~/data/go_cache"
  mountPoint: "/root/.gopath"
  writable: true
provision:
- mode: system
  script: |
    apt-get install -y apt-transport-https ca-certificates curl clang llvm jq
    apt-get install -y libelf-dev libpcap-dev libbfd-dev binutils-dev build-essential make
    apt-get install -y linux-tools-common linux-tools-$(uname -r)
    apt-get install -y bpfcc-tools
    apt-get install -y python3-pip

    export HOME=/root

    bash /script/linux-install-go.sh

    export RUSTUP_DIST_SERVER=https://mirrors.ustc.edu.cn/rust-static
    export RUSTUP_UPDATE_ROOT=https://mirrors.ustc.edu.cn/rust-static/rustup


    cat <<EOF >> /etc/hosts
    127.0.0.1  lima-HOSTNAME
    EOF


    sudo apt install curl build-essential gcc make -y

    cat <<EOF > /etc/resolv.conf
    nameserver 114.114.114.114
    EOF

    curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf > /tmp/rust.sh && chmod +x /tmp/rust.sh
    bash /tmp/rust.sh -y

    cat <<EOF >> $HOME/.bashrc
    . "$HOME/.cargo/env"
    export RUSTUP_DIST_SERVER=https://mirrors.ustc.edu.cn/rust-static
    export RUSTUP_UPDATE_ROOT=https://mirrors.ustc.edu.cn/rust-static/rustup
    EOF

    cat << EOF > $HOME/.cargo/config.toml
    [source.crates-io]
    registry = "https://github.com/rust-lang/crates.io-index"

    replace-with = 'ustc'

    [source.ustc]
    registry = "https://mirrors.ustc.edu.cn/crates.io-index/"

    [net]
    git-fetch-with-cli=true

    EOF

    ARCH=$(arch | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
    if [ "x86_64" = $(arch) ]
    then
      wget -O /usr/bin/ecli https://files.m.daocloud.io/github.com/eunomia-bpf/eunomia-bpf/releases/download/v1.0.27/ecli
      wget -O /usr/bin/ecc https://files.m.daocloud.io/github.com/eunomia-bpf/eunomia-bpf/releases/download/v1.0.27/ecc-x86_64
    else
      wget -O /usr/bin/ecc https://files.m.daocloud.io/github.com/eunomia-bpf/eunomia-bpf/releases/download/v1.0.27/ecc-aarch64
      wget -O /usr/bin/ecli https://files.m.daocloud.io/github.com/eunomia-bpf/eunomia-bpf/releases/download/v1.0.27/ecli-aarch64
    fi 
    chmod +x /usr/bin/ec*
